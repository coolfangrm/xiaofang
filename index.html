<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <base href="./">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <title>小帅同学的储物间</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="control-panel">
        <div class="control-panel-inner">
            <div class="info-section">
                <div class="datetime-display">
                    <span>🕒</span>
                    <span id="lastUpdatedDate">更新：2026-07-03</span>
                </div>
                <button class="theme-button" onclick="toggleTheme()" title="切换主题">
                    <span id="themeIcon">💧</span>
                </button>
            </div>

            <div class="button-group">
                <button onclick="expandAll()">一键展开</button>
                <button onclick="collapseAll()">一键折叠</button>
            </div>

            <div class="search-section">
                <div class="search-input-group">
                    <input type="text" id="searchInput" placeholder="输入搜索词..." autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" readonly="" onfocus="this.removeAttribute('readonly')">
                    <div class="search-type-container">
                        <div class="search-type-trigger" onmouseenter="showSearchTypeDropdown()" onmouseleave="hideSearchTypeDropdown()">
                            <span id="searchTypeText">本站搜索</span>
                            <span class="dropdown-arrow">▼</span>
                        </div>
                        <div id="searchTypeDropdown" class="search-type-dropdown" onmouseenter="showSearchTypeDropdown()" onmouseleave="hideSearchTypeDropdown()">
                            <div class="search-type-option selected" data-value="partial" onclick="selectSearchType('partial')">本站搜索</div>
                            <div class="search-type-option" data-value="engine" onclick="selectSearchType('engine')">联网搜索</div>
                        </div>
                    </div>
                    <button onclick="handleSearch()">搜索</button>
                </div>
                <div id="engineFilters" class="button-group" style="display:none;flex-wrap:wrap;gap:8px;align-items:center;position:relative;overflow:visible;">
                    <div class="multi-select-container">
                        <div class="multi-select-trigger" onmouseenter="showEngineDropdown()" onmouseleave="hideEngineDropdown()">
                            <span id="engineSelectionText">已选择 8 个引擎</span>
                            <span class="dropdown-arrow">▼</span>
                        </div>
                        <div id="engineDropdown" class="multi-select-dropdown" onmouseenter="showEngineDropdown()" onmouseleave="hideEngineDropdown()">
                            <div class="dropdown-header">
                                <label class="select-all-label">
                                    <input type="checkbox" id="selectRecommendedEngines" checked="">
                                    <span>推荐</span>
                                </label>
                                <label class="select-all-label">
                                    <input type="checkbox" id="selectAllEngines">
                                    <span>全选</span>
                                </label>
                            </div>
                            <div class="dropdown-options">
                                <label class="dropdown-option">
                                    <input type="checkbox" value="bing" checked="">
                                    <span>必应搜索</span>
                                </label>
                                <label class="dropdown-option">
                                    <input type="checkbox" value="google" checked="">
                                    <span>谷歌搜索</span>
                                </label>
                                <label class="dropdown-option">
                                    <input type="checkbox" value="baidu" checked="">
                                    <span>百度搜索</span>
                                </label>
                                <label class="dropdown-option">
                                    <input type="checkbox" value="bilibili" checked="">
                                    <span>B站搜索</span>
                                </label>
                                <label class="dropdown-option">
                                    <input type="checkbox" value="zhihu" checked="">
                                    <span>知乎搜索</span>
                                </label>
                                <label class="dropdown-option">
                                    <input type="checkbox" value="weixin" checked="">
                                    <span>公众号搜索</span>
                                </label>
                                <label class="dropdown-option">
                                    <input type="checkbox" value="52pojie" checked="">
                                    <span>吾爱破解</span>
                                </label>
                                <label class="dropdown-option">
                                    <input type="checkbox" value="linuxdo" checked="">
                                    <span>LinuxDo</span>
                                </label>
                                <label class="dropdown-option">
                                    <input type="checkbox" value="youtube">
                                    <span>YouTube搜索</span>
                                </label>
                                <label class="dropdown-option">
                                    <input type="checkbox" value="douyin">
                                    <span>抖音搜索</span>
                                </label>
                                <label class="dropdown-option">
                                    <input type="checkbox" value="sogou">
                                    <span>搜狗搜索</span>
                                </label>
                                <label class="dropdown-option">
                                    <input type="checkbox" value="ddgo">
                                    <span>DuckDuckGo</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="navButtons" class="button-group">
                    <button onclick="prevHighlight()">上一个</button>
                    <button onclick="nextHighlight()">下一个</button>
                </div>
            </div>
        </div>
    </div>

    <div id="pan-results" class="content" style="display:none; z-index: 0; position: relative;"></div>

    <div id="main-content" class="content" style="z-index: 0; position: relative;"></div>

    <script src="script.js"></script>
</body>
</html>
